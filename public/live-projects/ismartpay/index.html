  <!-- CSS to prevent icon text flash (FOUC) -->
  <style>
    /* Ensure Material Symbols icons are always visible once rendered */
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      /* Prevent icon name from showing - use font-display: block in font loading */
    }

    /* Hide icon text content until font is loaded (prevents FOUC) */
    .material-symbols-outlined:not(.font-loaded) {
      opacity: 0;
      visibility: hidden;
      font-display: block;
    }

    /* Show icons once font is confirmed loaded */
    .material-symbols-outlined.font-loaded,
    html.fonts-loaded .material-symbols-outlined {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.2s ease-in;
    }

    /* Fallback: Show icons after short delay if detection fails */
    @supports (font-display: block) {
      .material-symbols-outlined {
        animation: iconFadeIn 0.1s ease-in 0.4s forwards;
      }
    }

    @keyframes iconFadeIn {
      to {
        opacity: 1;
        visibility: visible;
      }
    }
  </style>

  <!-- Font loading detection script -->
  <script>
    // Detect when Material Symbols font is loaded
    (function () {
      if ('fonts' in document) {
        // Use Font Loading API for reliable detection
        Promise.all([
          document.fonts.load('1em Material Symbols Outlined'),
          document.fonts.ready
        ]).then(function () {
          document.documentElement.classList.add('fonts-loaded');
          // Mark all icon elements as loaded
          const icons = document.querySelectorAll('.material-symbols-outlined');
          icons.forEach(function (icon) {
            icon.classList.add('font-loaded');
          });
        }).catch(function (err) {
          console.warn('Font loading detection failed:', err);
          // Fallback: show icons after delay
          setTimeout(function () {
            document.documentElement.classList.add('fonts-loaded');
          }, 500);
        });
      } else {
        // Fallback for browsers without Font Loading API
        setTimeout(function () {
          document.documentElement.classList.add('fonts-loaded');
          const icons = document.querySelectorAll('.material-symbols-outlined');
          icons.forEach(function (icon) {
            icon.classList.add('font-loaded');
          });
        }, 300);
      }

      // Also observe when new icons are added dynamically
      if (window.MutationObserver) {
        const observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (mutation) {
            mutation.addedNodes.forEach(function (node) {
              if (node.nodeType === 1) { // Element node
                if (node.classList && node.classList.contains('material-symbols-outlined')) {
                  if (document.documentElement.classList.contains('fonts-loaded')) {
                    node.classList.add('font-loaded');
                  }
                }
                // Check children
                const icons = node.querySelectorAll && node.querySelectorAll('.material-symbols-outlined');
                if (icons) {
                  icons.forEach(function (icon) {
                    if (document.documentElement.classList.contains('fonts-loaded')) {
                      icon.classList.add('font-loaded');
                    }
                  });
                }
              }
            });
          });
        });

        // Start observing when DOM is ready
        if (document.body) {
          observer.observe(document.body, {
            childList: true,
            subtree: true
          });
        } else {
          document.addEventListener('DOMContentLoaded', function () {
            observer.observe(document.body, {
              childList: true,
              subtree: true
            });
          });
        }
      }
    })();
  </script>
